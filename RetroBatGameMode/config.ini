; ====================================================================
; RETROBAT GAME MODE OPTIMIZER CONFIGURATION FILE
; All options below are hot-reloadable: editing this file while the
; program is running applies changes instantly (live mode) without
; restarting the process. Toggle 'Enable' to enable/disable on the fly.
; ====================================================================

[Settings]

; --- Master switch --------------------------------------------------
; Enable  : Enable (true) or disable (false) all optimizations at
;           once. When set to false the system is fully restored and
;           the process keeps running, waiting for 'Enable=true' to
;           re-apply optimizations. (Hot-reloadable)
Enable=true

; --- Explorer / Shell ------------------------------------------------
; KillExplorer : Hide the taskbar, desktop icons and Explorer folder
;                windows to free resources and avoid focus stealing.
;                The explorer.exe process is left alive to prevent
;                Windows from auto-restarting it. (Hot-reloadable)
KillExplorer=true

; --- Memory ----------------------------------------------------------
; EmptyWorkingSet : Force Windows to trim the working set (RAM)
;                   of all accessible processes to reclaim memory.
;                   (Hot-reloadable)
EmptyWorkingSet=true

; --- Background apps -------------------------------------------------
; SuspendBackgroundApps : Suspend (freeze) non-essential background
;                         applications (browsers, launchers, etc.)
;                         to free CPU/GPU for the game. Elevated
;                         processes are never suspended.
;                         (Hot-reloadable)
SuspendBackgroundApps=true

; --- Window hiding ---------------------------------------------------
; HideNonSuspendedWindows : Hide visible windows of apps that are not
;                          in the HideWhitelist, even if they are not
;                          suspended, to get a clean desktop.
;                          (Hot-reloadable)
HideNonSuspendedWindows=true

; --- Overlay / UI -----------------------------------------------------
; ShowOverlay : Show a brief on-screen notification when Game Mode is
;              enabled (green) or disabled (red).
;              (Hot-reloadable)
ShowOverlay=true

; --- Language ---------------------------------------------------------
; Language : Language for overlay messages. Values: 'system' (auto),
;            'fr' (French) or 'en' (English). (Hot-reloadable)
Language=system

; --- Auto-start -------------------------------------------------------
; AutoStartWithRetroBat : Automatically generate a startup script in
;                        RetroBat's EmulationStation start scripts
;                        folder so this optimizer launches with ES.
;                        (Applied at startup only)
AutoStartWithRetroBat=true

; --- Console ----------------------------------------------------------
; ShowConsole : Allocate and show a debug console window alongside
;              the process. (Applied at startup only)
ShowConsole=false

; --- Logging ----------------------------------------------------------
; LogToFile : Write log entries to RetroBatGameMode.log next to the
;             executable (rotated at 1 MB). (Hot-reloadable)
LogToFile=true

; --- Whitelists -------------------------------------------------------
; Whitelist : Comma-separated list of process names that will never
;             be suspended. Add emulators or media players here.
;             (Hot-reloadable)
Whitelist=retrobat, emulationstation, retroarch, vlc

; HideWhitelist : Comma-separated list of process names whose
;                 windows will never be hidden. Usually contains
;                 the emulator/front-end and Explorer.
;                 (Hot-reloadable)
HideWhitelist=retrobat, emulationstation, retroarch, vlc, explorer

; --- Standalone monitor (third-party app surveillance) -----------------
; StandaloneMonitor : Allow the optimizer to keep running and stay
;                    active even when RetroBat/EmulationStation is not
;                    running. When 'true', the process keeps running in
;                    idle/standby mode and starts optimizing as soon as
;                    RetroBat OR any process listed in 'ThirdPartyApps'
;                    is detected. When 'false' (default), the process
;                    exits automatically after RetroBat/EmulationStation
;                    closes. (Hot-reloadable)
StandaloneMonitor=false

; ThirdPartyApps : Comma-separated list of additional process names
;                  that should ALSO trigger optimizations (in addition
;                  to RetroBat/EmulationStation). When any monitored
;                  app is running, optimizations are applied. The
;                  system is restored only when ALL monitored apps
;                  (RetroBat + ThirdPartyApps) have closed.
;                  Example: 'chrome, firefox, vlc' (without quotes).
;                  (Hot-reloadable). Empty by default.
ThirdPartyApps=

; --- Runtime state (do not edit manually) ----------------------------
; These keys track active/recoverable state and are managed by the
; program and watchdog. Do not modify them manually.
SuspendedApps=
LastSuspendedApps=
HiddenApps=
LastHiddenApps=