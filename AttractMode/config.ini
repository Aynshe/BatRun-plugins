; ====================================================================
; RETROBAT ATTRACT MODE CONFIGURATION FILE
; Enregistrez ce fichier sous le nom de "config.ini" dans le même dossier
; que l'exécutable RetroBatAttractMode.exe
; ====================================================================

[Settings]
; Délai en secondes pendant lequel le programme reste sur un jeu pour jouer sa vidéo
GameDisplayDelay=15

; Temps d'inactivité requis (en secondes) avant de déclencher l'Attract Mode
; Détecte l'absence d'activité Clavier, Souris et Manettes (XInput)
InactivityTimeout=60

; Nombre maximum de jeux à faire défiler dans un même système avant de revenir en arrière
; pour changer de système. Cela évite de rester bloqué trop longtemps sur un seul système.
MaxGamesPerSystem=3

; Paramètres d'émulation du défilement (scrolling aléatoire)
MinScrollTicks=2
MaxScrollTicks=8
ScrollDelayMs=80

; Activer l'écriture des actions dans un fichier de log (attract_mode_log.txt)
LogToFile=true

; Touche clavier pour valider / entrer dans un système (par défaut: X)
; Supporte les lettres individuelles (X, Z...) ou touches spéciales (ENTER, ESCAPE, SPACE...)
EnterKey=X

; Touche clavier pour annuler / sortir d'un système (par défaut: Z)
ExitKey=Z

; Mettre en veille / suspendre l'Attract Mode si EmulationStation n'est pas au premier plan (par défaut: true)
OnlyWhenFocused=true

; Créer un script d'auto-démarrage dans retrobat/scripts/start pour lancer AttractMode en même temps qu'ES (par défaut: false)
CreateStartScript=false

; Afficher une console pour voir les logs d'exécution de l'assistant (par défaut: false)
ShowConsole=false
